apiVersion: v1
kind: Service
metadata:
  name: library-management-service
  namespace: library-app
  labels:
    app: library-management-system
spec:
  type: NodePort
  selector:
    app: library-management-system
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: library-management-internal
  namespace: library-app
  labels:
    app: library-management-system
spec:
  type: ClusterIP
  selector:
    app: library-management-system
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
