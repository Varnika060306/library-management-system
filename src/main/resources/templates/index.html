<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Library Management System</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #f4f4f4;
        }

        h1 {
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th,
        td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            color: white;
        }

        .yes {
            background: green;
        }

        .no {
            background: red;
        }
    </style>
</head>

<body>
    <h1>📚 Library Management System</h1>
    <h3>All Books</h3>
    <table>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>ISBN</th>
            <th>Category</th>
            <th>Available</th>
        </tr>
        <tr th:each="book : ${books}">
            <td th:text="${book.id}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.isbn}"></td>
            <td th:text="${book.category}"></td>
            <td>
                <span th:if="${book.available}" class="badge yes">Yes</span>
                <span th:unless="${book.available}" class="badge no">No</span>
            </td>
        </tr>
    </table>
</body>

</html>
